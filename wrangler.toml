name = "literature-evidence"
pages_build_output_dir = "public"
compatibility_date = "2026-07-13"

[[d1_databases]]
binding = "LIT_DB"
database_name = "lit-db"
database_id = "6bc3a0b0-52a1-4e3b-8764-349c7dd3c903"

[[r2_buckets]]
binding = "LIT_R2"
bucket_name = "lit-r2"

# Optional bindings:
# - KV namespace binding: RESEARCH_AUTH_KV
# - Queue binding: LIT_QUEUE

[vars]
APP_RESOURCE_MODE = "free"
DEFAULT_BATCH_LIMIT = "15"
DAILY_JOB_UNIT_LIMIT = "800"
MAX_PDF_BYTES = "15728640"
TEMP_RETENTION_DAYS = "7"
PDF_RETENTION_DAYS = "30"
PARSE_RETENTION_DAYS = "30"
